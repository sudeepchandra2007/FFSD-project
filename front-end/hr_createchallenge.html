<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Launch a New Challenge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=Playfair+Display:ital,wght@1,700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link rel="stylesheet" href="hr_createchallenge.css" />
  </head>
  <body>
    <main class="challenge-page">
      <section class="challenge-shell">
        <div class="brand">StackBuilders</div>

        <header class="page-copy">
          <h1>Launch a New Challenge</h1>
          <p>Create engaging wellness challenges for our team</p>
        </header>

        <section class="form-card">
          <form class="challenge-form">
            <div class="field-group">
              <label for="challengeName"
                ><i class="fa-regular fa-bookmark" aria-hidden="true"></i>
                Challenge Name</label
              >
              <input
                id="challengeName"
                type="text"
                placeholder="Enter Challenge Name"
                required
              />
            </div>

            <div class="field-group">
              <label for="challengeTitle"
                ><i class="fa-regular fa-bookmark" aria-hidden="true"></i>
                Challenge Type</label
              >
              <input
                id="challengeTitle"
                type="text"
                placeholder="Enter Challenge Title"
                required
              />
            </div>

            <div class="field-group">
              <label for="challengeReward"
                ><i class="fa-regular fa-bookmark" aria-hidden="true"></i>
                Reward</label
              >
              <input
                id="challengeReward"
                type="text"
                placeholder="Enter Reward"
                required
              />
            </div>

            <div class="field-group">
              <label for="challengeDeadline"
                ><i class="fa-regular fa-calendar" aria-hidden="true"></i>
                Deadline</label
              >
              <input id="challengeDeadline" type="date" />
            </div>

            <div class="field-group">
              <label for="challengeGoal"
                ><i class="fa-regular fa-circle-dot" aria-hidden="true"></i>
                Goal</label
              >
              <input
                id="challengeGoal"
                type="text"
                placeholder="Enter Goal (e.g., 10000 steps)"
                required
              />
            </div>

            <div class="form-actions">
              <button class="submit-btn" type="submit">
                <i class="fa-solid fa-trophy" aria-hidden="true"></i>
                Launch Challenge
              </button>
              <a class="back-btn" href="hr_challenges.html" aria-label="Back"
                >Back</a
              >
            </div>
          </form>
        </section>
      </section>
    </main>
  </body>
</html>
