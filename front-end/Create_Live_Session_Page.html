<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Live Session</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Lobster&display=swap"
    rel="stylesheet"
  />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  />
  <link rel="stylesheet" href="Create_Live_Session_Page.css" />
</head>
<body>
  <div class="shell">
    <nav class="navbar">
      <div class="logo">Stack Builders</div>

      <div class="nav-links">
        <a href="Wellness_Dashboard.html"><i class="fa-solid fa-house"></i> Home</a>
        <a href="Wellness_Consultation_Dashboard.html"><i class="fa-regular fa-calendar"></i> Consultation</a>
        <a href="Expert_Live_Session.html" class="active"><i class="fa-solid fa-tower-broadcast"></i> Live Session</a>
        <a href="Expert_Video_Library.html"><i class="fa-solid fa-video"></i> Video Library</a>
      </div>

      <div class="nav-right">
        <span>Welcome back, Tushar!</span>
        <i class="fa-regular fa-bell"></i>
        <i class="fa-regular fa-user"></i>
      </div>
    </nav>

    <main class="page">
      <section class="hero-card">
        <div>
          <p class="eyebrow">LIVE SESSION SETUP</p>
          <h1>Create Live Session</h1>
          <p class="hero-copy">Plan your next wellness session with the right title, schedule, audience, and session details.</p>
        </div>
        <a class="back-link" href="Expert_Live_Session.html">
          <i class="fa-solid fa-arrow-left"></i>
          Back to Live Sessions
        </a>
      </section>

      <section class="form-card">
        <form class="session-form">
          <div class="form-grid">
            <label class="field field-wide">
              <span>Session Title</span>
              <input type="text" placeholder="Enter session title" />
            </label>

            <label class="field">
              <span>Category</span>
              <select>
                <option>Mind Relaxation</option>
                <option>Mental Wellness</option>
                <option>Nutrition</option>
                <option>Physical Wellness</option>
              </select>
            </label>

            <label class="field">
              <span>Session Type</span>
              <select>
                <option>Video Session</option>
                <option>Webinar</option>
                <option>Workshop</option>
              </select>
            </label>

            <label class="field">
              <span>Date</span>
              <input type="date" />
            </label>

            <label class="field">
              <span>Start Time</span>
              <input type="time" />
            </label>

            <label class="field">
              <span>Duration</span>
              <select>
                <option>30 Minutes</option>
                <option>45 Minutes</option>
                <option>60 Minutes</option>
                <option>90 Minutes</option>
              </select>
            </label>

            <label class="field">
              <span>Max Participants</span>
              <input type="number" min="1" placeholder="50" />
            </label>

            <label class="field">
              <span>Meeting Link</span>
              <input type="url" placeholder="Paste live session link" />
            </label>

            <label class="field field-wide">
              <span>Short Description</span>
              <textarea rows="5" placeholder="Describe what participants will learn in this session."></textarea>
            </label>

            <label class="field field-wide">
              <span>Key Takeaways</span>
              <textarea rows="4" placeholder="Add session highlights or outcomes."></textarea>
            </label>
          </div>

          <div class="action-bar">
            <a class="secondary-btn" href="Expert_Live_Session.html">Cancel</a>
            <button class="primary-btn" type="submit">Create Session</button>
          </div>
        </form>
      </section>
    </main>
  </div>
</body>
</html>
