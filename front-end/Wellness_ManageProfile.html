<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wellness Expert Profile | Edit</title>
    <link rel="stylesheet" href="Employee_Manage_Profile.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="main-wrapper">
    <header class="profile-header">
        <div class="header-content">
            <div class="text-group">
                <h1>Manage Profile</h1>
                <p>View and manage your wellness expert profile information</p>
            </div>
            <button class="btn-back" id="manageProfileBackBtn">Back</button>
        </div>
    </header>

    <div class="profile-container">
        <section class="glass-card">
            <div class="profile-hero">
                <div class="avatar-wrapper">
                    <div class="avatar-circle" id="manageProfileAvatar">NA</div>
                    <button class="edit-photo-btn" type="button">Photo</button>
                </div>
                <div class="hero-text">
                    <h2 id="manageProfileHeading">Wellness Expert</h2>
                    <span id="manageProfileSubheading">@expert</span>
                </div>
            </div>

            <div class="input-grid">
                <div class="field">
                    <label>Username</label>
                    <input type="text" id="manageProfileUsername" value="" disabled>
                    <span class="hint">Username cannot be changed</span>
                </div>
                <div class="field">
                    <label>Full Name</label>
                    <input type="text" id="manageProfileName" value="">
                </div>
                <div class="field">
                    <label>Phone Number</label>
                    <input type="text" id="manageProfilePhoneNumber" value="" placeholder="Enter phone number">
                </div>
                <div class="field">
                    <label>Status</label>
                    <input type="text" id="manageProfileStatusValue" value="" disabled>
                </div>
            </div>
            <button class="btn-primary" id="saveProfileBtn" type="button">Save Profile</button>
            <span class="hint" id="manageProfileStatus" hidden></span>
        </section>

        <section class="glass-card">
            <div class="section-title">
                <h3>Professional Details</h3>
                <div class="bmi-badge" id="manageProfileSpecializationBadge">Expert</div>
            </div>
            <div class="input-grid">
                <div class="field">
                    <label>Specialization</label>
                    <input type="text" id="manageProfileSpecialization" value="">
                </div>
                <div class="field">
                    <label>Experience</label>
                    <input type="text" id="manageProfileExperience" value="" placeholder="e.g., 5 years">
                </div>
            </div>
            <button class="btn-primary" id="updateProfessionalBtn" type="button">Update Details</button>
        </section>

        <section class="glass-card">
            <h3>Security</h3>
            <div class="input-grid">
                <div class="field full">
                    <label>Current Password</label>
                    <input type="password" id="manageProfileCurrentPassword" placeholder="Enter current password">
                </div>
                <div class="field">
                    <label>New Password</label>
                    <input type="password" id="manageProfileNewPassword" minlength="6">
                </div>
                <div class="field">
                    <label>Confirm Password</label>
                    <input type="password" id="manageProfileConfirmPassword">
                </div>
            </div>
            <button class="btn-primary" id="changePasswordBtn" type="button">Change Password</button>
        </section>
    </div>
</div>

<script src="expertAuth.js"></script>
<script src="apiClient.js"></script>
<script src="Wellness_ManageProfile.js"></script>
</body>
</html>
