<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stack Builders Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lobster&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link rel="stylesheet" href="signup.css" />
  </head>
  <body>
    <main class="login-page">
      <section class="auth-card">
        <div class="brand-block">
          <h1>Stack Builders</h1>
          <span class="brand-underline"></span>
        </div>

        <div class="auth-copy">
          <h2>Sign In to Stack Builders</h2>
          <p>Enter your credentials to manage your wellness journey</p>
        </div>

        <form
          class="auth-form"
          id="signupLoginForm"
          action="#"
        >
          <label class="field">
            <span>Gmail</span>
            <div class="input-wrap">
              <i class="fa-regular fa-user"></i>
              <input
                id="signupUsername"
                name="username"
                type="email"
                placeholder="Enter your Gmail"
                required
              />
            </div>
          </label>

          <label class="field">
            <span>Password</span>
            <div class="input-wrap">
              <i class="fa-solid fa-lock"></i>
              <input
                id="signupPassword"
                name="password"
                type="password"
                placeholder="Enter your password"
                required
              />
            </div>
          </label>

          <p class="auth-error" id="signupAuthError" hidden></p>

          <div class="action-row">
            <button type="submit" class="submit-btn">Sign In</button>
            <a href="homepage.html" class="back-btn">Back</a>
          </div>

          <div class="request-link-row">
            <p class="auth-helper auth-helper--center">
              Need a company and HR account approved first?
            </p>
            <a href="company_request.html" class="request-link-btn">
              Request Company Approval
            </a>
          </div>
        </form>
      </section>
    </main>
    <script src="employeeAuth.js"></script>
    <script src="expertAuth.js"></script>
    <script src="hrProfileStore.js"></script>
    <script src="hrAuth.js"></script>
    <script src="adminAuth.js"></script>
    <script src="companyOnboardingRequestStore.js"></script>
    <script src="signup.js"></script>
  </body>
</html>
