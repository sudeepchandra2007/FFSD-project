<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Add User</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=Playfair+Display:ital,wght@1,700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link rel="stylesheet" href="admin_adduser.css" />
  </head>
  <body>
    <main class="admin-page">
      <section class="admin-shell">
        <div class="brand">StackBuilders</div>

        <header class="page-copy">
          <h1 id="pageTitle">Add User</h1>
          <p id="pageSubtitle">
            Select a role and the form will update automatically for admin user creation.
          </p>
        </header>

        <section class="form-card">
          <form class="admin-form" action="#" novalidate>
            <div class="role-chips" aria-label="Role quick selection">
              <button class="role-chip active" type="button" data-role="employee">
                <i class="fa-solid fa-user"></i>
                Employee
              </button>
              <button class="role-chip" type="button" data-role="hr">
                <i class="fa-solid fa-users-gear"></i>
                HR
              </button>
              <button class="role-chip" type="button" data-role="expert">
                <i class="fa-solid fa-heart-pulse"></i>
                Wellness Expert
              </button>
            </div>

            <div class="field-group">
              <label for="nameField" id="nameLabel">Employee Name</label>
              <input id="nameField" type="text" placeholder="Enter employee name" />
            </div>

            <div class="field-group employee-only">
              <label for="employeeCompany">Company Name</label>
              <input id="employeeCompany" type="text" list="companySuggestions" placeholder="Enter company name" />
            </div>

            <div class="field-group employee-only">
              <label for="department">Department Name</label>
              <div class="select-wrap">
                <select id="department" name="department">
                  <option selected disabled>Select Department</option>
                  <option>Engineering</option>
                  <option>Marketing</option>
                  <option>Sales</option>
                  <option>Finance</option>
                  <option>Operations</option>
                  <option>Advertising</option>
                </select>
                <i class="fa-solid fa-chevron-down" aria-hidden="true"></i>
              </div>
            </div>

            <div class="field-group expert-only">
              <label for="expertCompany">Company Name</label>
              <input id="expertCompany" type="text" list="companySuggestions" placeholder="Enter company name" />
            </div>

            <div class="field-group expert-only">
              <label for="experience">Experience (Years)</label>
              <div class="input-icon-wrap">
                <i class="fa-solid fa-briefcase" aria-hidden="true"></i>
                <input id="experience" type="number" min="0" max="60" placeholder="Enter years of experience" />
              </div>
            </div>

            <div class="field-group">
              <label for="emailAddress">Gmail Address</label>
              <div class="input-icon-wrap">
                <i class="fa-regular fa-envelope" aria-hidden="true"></i>
                <input id="emailAddress" type="email" placeholder="Enter Gmail" />
              </div>
            </div>

            <div class="field-group">
              <label for="password">Password</label>
              <input id="password" type="password" placeholder="Enter Password" minlength="6" />
            </div>

            <div class="field-group hr-only">
              <label for="companyName">Company Name</label>
              <input id="companyName" type="text" list="companySuggestions" placeholder="Enter company name" />
            </div>

            <datalist id="companySuggestions"></datalist>

            <div class="field-group expert-only">
              <label>Specialization</label>
              <div class="specialization-grid">
                <label class="special-card">
                  <input type="radio" name="specialization" value="Physical Trainer" />
                  <span class="special-card-inner">
                    <i class="fa-solid fa-wave-square" aria-hidden="true"></i>
                    <strong>Physical Trainer</strong>
                  </span>
                </label>

                <label class="special-card">
                  <input type="radio" name="specialization" value="Nutritionist" />
                  <span class="special-card-inner">
                    <i class="fa-solid fa-stethoscope" aria-hidden="true"></i>
                    <strong>Nutritionist</strong>
                  </span>
                </label>

                <label class="special-card">
                  <input type="radio" name="specialization" value="Psychologist" />
                  <span class="special-card-inner">
                    <i class="fa-solid fa-brain" aria-hidden="true"></i>
                    <strong>Psychologist</strong>
                  </span>
                </label>
              </div>
            </div>

            <div class="form-actions">
              <button class="submit-btn" id="submitBtn" type="submit">Add Employee</button>
              <a class="back-btn" href="usermgmt.html">Back</a>
            </div>
            <p class="form-message" id="userFormMessage" aria-live="polite"></p>
          </form>
        </section>
      </section>
    </main>

    <script>
      const roleChips = document.querySelectorAll(".role-chip");
      const pageTitle = document.getElementById("pageTitle");
      const pageSubtitle = document.getElementById("pageSubtitle");
      const submitBtn = document.getElementById("submitBtn");
      const adminForm = document.querySelector(".admin-form");
      const nameLabel = document.getElementById("nameLabel");
      const nameField = document.getElementById("nameField");

      const roleConfig = {
        employee: {
          title: "Add Employee",
          subtitle: "Create an employee account with department, Gmail, and password details.",
          button: "Add Employee",
          nameLabel: "Employee Name",
          namePlaceholder: "Enter employee name",
        },
        hr: {
          title: "Add HR User",
          subtitle: "Create an HR account with full name, company name, Gmail, and password.",
          button: "Add HR",
          nameLabel: "Full Name",
          namePlaceholder: "Enter full name",
        },
        expert: {
          title: "Add Wellness Expert",
          subtitle: "Create a wellness expert profile with experience, Gmail, password, and specialization.",
          button: "Add Expert",
          nameLabel: "Expert Name",
          namePlaceholder: "Enter expert name",
        },
      };

      function setRole(role) {
        adminForm.dataset.role = role;
        pageTitle.textContent = roleConfig[role].title;
        pageSubtitle.textContent = roleConfig[role].subtitle;
        submitBtn.textContent = roleConfig[role].button;
        nameLabel.textContent = roleConfig[role].nameLabel;
        nameField.placeholder = roleConfig[role].namePlaceholder;

        roleChips.forEach((chip) => {
          chip.classList.toggle("active", chip.dataset.role === role);
        });
      }

      roleChips.forEach((chip) => {
        chip.addEventListener("click", () => {
          setRole(chip.dataset.role);
        });
      });

      setRole("employee");
    </script>
<script src="adminAuth.js"></script>
<script src="apiClient.js"></script>
<script src="script.js"></script>
  </body>
</html>
